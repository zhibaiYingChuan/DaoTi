name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check . --ignore E501,W291,W293 --exclude _constants.py

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify requirements
        run: |
          pip install --dry-run -r requirements.txt 2>&1 || true
          python -c "
          import ast, sys, os
          ok = True
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d.startswith('.')]
              for f in files:
                  if not f.endswith('.py'):
                      continue
                  path = os.path.join(root, f)
                  try:
                      with open(path) as fh:
                          ast.parse(fh.read())
                      print(f'[OK] {path}')
                  except SyntaxError as e:
                      print(f'[FAIL] {path}: {e}')
                      ok = False
          sys.exit(0 if ok else 1)
          "

  training-leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for training logic leaks
        run: python scripts/check_training_leak.py
